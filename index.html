<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Focusflow - Pomodoro Todo</title>
<style>
  /* ===== CSS Variables & Themes ===== */
  :root {
    --font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif;
    --radius-sm: 10px;
    --radius-md: 16px;
    --radius-lg: 24px;
    --radius-xl: 32px;
    --shadow-sm: 0 2px 8px rgba(0,0,0,0.06);
    --shadow-md: 0 4px 20px rgba(0,0,0,0.08);
    --shadow-lg: 0 8px 40px rgba(0,0,0,0.12);
    --transition: all 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    --blur: 20px;
  }

  /* Sunset Theme */
  [data-theme="sunset"] {
    --bg-gradient: linear-gradient(145deg, #ff6b6b 0%, #ff8e53 30%, #ffb347 60%, #ff6b9d 100%);
    --card-bg: rgba(255,255,255,0.85);
    --card-border: rgba(255,255,255,0.5);
    --text-primary: #2d1b1b;
    --text-secondary: #6b4a4a;
    --text-muted: #9a7a7a;
    --accent: #ff6b6b;
    --accent-light: rgba(255,107,107,0.12);
    --accent-glow: rgba(255,107,107,0.3);
    --success: #34c759;
    --danger: #ff3b30;
    --input-bg: rgba(255,255,255,0.7);
    --input-border: rgba(255,107,107,0.3);
    --timer-ring: #ff6b6b;
    --timer-ring-bg: rgba(255,107,107,0.15);
    --btn-primary-bg: linear-gradient(135deg, #ff6b6b, #ff8e53);
    --btn-primary-text: #fff;
    --completed-bg: rgba(52,199,89,0.08);
    --completed-border: rgba(52,199,89,0.2);
    --theme-dot: linear-gradient(135deg, #ff6b6b, #ff8e53);
  }

  /* Ocean Theme */
  [data-theme="ocean"] {
    --bg-gradient: linear-gradient(145deg, #667eea 0%, #43e97b 50%, #38f9d7 100%);
    --card-bg: rgba(255,255,255,0.85);
    --card-border: rgba(255,255,255,0.5);
    --text-primary: #1a2a4a;
    --text-secondary: #4a5a7a;
    --text-muted: #7a8aaa;
    --accent: #667eea;
    --accent-light: rgba(102,126,234,0.12);
    --accent-glow: rgba(102,126,234,0.3);
    --success: #34c759;
    --danger: #ff3b30;
    --input-bg: rgba(255,255,255,0.7);
    --input-border: rgba(102,126,234,0.3);
    --timer-ring: #667eea;
    --timer-ring-bg: rgba(102,126,234,0.15);
    --btn-primary-bg: linear-gradient(135deg, #667eea, #43e97b);
    --btn-primary-text: #fff;
    --completed-bg: rgba(52,199,89,0.08);
    --completed-border: rgba(52,199,89,0.2);
    --theme-dot: linear-gradient(135deg, #667eea, #43e97b);
  }

  /* Lavender Theme */
  [data-theme="lavender"] {
    --bg-gradient: linear-gradient(145deg, #a18cd1 0%, #fbc2eb 50%, #f6d365 100%);
    --card-bg: rgba(255,255,255,0.85);
    --card-border: rgba(255,255,255,0.5);
    --text-primary: #2a1a3a;
    --text-secondary: #5a4a6a;
    --text-muted: #8a7a9a;
    --accent: #a18cd1;
    --accent-light: rgba(161,140,209,0.12);
    --accent-glow: rgba(161,140,209,0.3);
    --success: #34c759;
    --danger: #ff3b30;
    --input-bg: rgba(255,255,255,0.7);
    --input-border: rgba(161,140,209,0.3);
    --timer-ring: #a18cd1;
    --timer-ring-bg: rgba(161,140,209,0.15);
    --btn-primary-bg: linear-gradient(135deg, #a18cd1, #fbc2eb);
    --btn-primary-text: #fff;
    --completed-bg: rgba(52,199,89,0.08);
    --completed-border: rgba(52,199,89,0.2);
    --theme-dot: linear-gradient(135deg, #a18cd1, #fbc2eb);
  }

  /* Midnight Theme (Dark) */
  [data-theme="midnight"] {
    --bg-gradient: linear-gradient(145deg, #0c0c1d 0%, #1a1a3e 40%, #2d1b69 70%, #0c0c1d 100%);
    --card-bg: rgba(30,30,60,0.85);
    --card-border: rgba(255,255,255,0.08);
    --text-primary: #f0f0ff;
    --text-secondary: #b0b0d0;
    --text-muted: #707090;
    --accent: #7c5cfc;
    --accent-light: rgba(124,92,252,0.15);
    --accent-glow: rgba(124,92,252,0.4);
    --success: #30d158;
    --danger: #ff453a;
    --input-bg: rgba(255,255,255,0.06);
    --input-border: rgba(124,92,252,0.3);
    --timer-ring: #7c5cfc;
    --timer-ring-bg: rgba(124,92,252,0.15);
    --btn-primary-bg: linear-gradient(135deg, #7c5cfc, #b86cfc);
    --btn-primary-text: #fff;
    --completed-bg: rgba(48,209,88,0.1);
    --completed-border: rgba(48,209,88,0.2);
    --theme-dot: linear-gradient(135deg, #7c5cfc, #b86cfc);
  }

  /* Forest Theme */
  [data-theme="forest"] {
    --bg-gradient: linear-gradient(145deg, #134e5e 0%, #2ecc71 40%, #71b280 70%, #134e5e 100%);
    --card-bg: rgba(255,255,255,0.85);
    --card-border: rgba(255,255,255,0.5);
    --text-primary: #0a2a1a;
    --text-secondary: #3a5a4a;
    --text-muted: #6a8a7a;
    --accent: #2ecc71;
    --accent-light: rgba(46,204,113,0.12);
    --accent-glow: rgba(46,204,113,0.3);
    --success: #27ae60;
    --danger: #e74c3c;
    --input-bg: rgba(255,255,255,0.7);
    --input-border: rgba(46,204,113,0.3);
    --timer-ring: #2ecc71;
    --timer-ring-bg: rgba(46,204,113,0.15);
    --btn-primary-bg: linear-gradient(135deg, #2ecc71, #134e5e);
    --btn-primary-text: #fff;
    --completed-bg: rgba(46,204,113,0.08);
    --completed-border: rgba(46,204,113,0.2);
    --theme-dot: linear-gradient(135deg, #2ecc71, #134e5e);
  }

  /* Cherry Blossom Theme */
  [data-theme="sakura"] {
    --bg-gradient: linear-gradient(145deg, #ffecd2 0%, #fcb69f 30%, #ff9a9e 60%, #fecfef 100%);
    --card-bg: rgba(255,255,255,0.88);
    --card-border: rgba(255,255,255,0.6);
    --text-primary: #3d1a2a;
    --text-secondary: #7a4a5a;
    --text-muted: #b07a8a;
    --accent: #ff6b8a;
    --accent-light: rgba(255,107,138,0.12);
    --accent-glow: rgba(255,107,138,0.3);
    --success: #34c759;
    --danger: #ff3b30;
    --input-bg: rgba(255,255,255,0.7);
    --input-border: rgba(255,107,138,0.3);
    --timer-ring: #ff6b8a;
    --timer-ring-bg: rgba(255,107,138,0.15);
    --btn-primary-bg: linear-gradient(135deg, #ff6b8a, #fcb69f);
    --btn-primary-text: #fff;
    --completed-bg: rgba(52,199,89,0.08);
    --completed-border: rgba(52,199,89,0.2);
    --theme-dot: linear-gradient(135deg, #ff6b8a, #fcb69f);
  }

  /* ===== Reset & Base ===== */
  *, *::before, *::after {
    margin: 0; padding: 0; box-sizing: border-box;
  }

  html { font-size: 16px; -webkit-font-smoothing: antialiased; }

  body {
    font-family: var(--font-family);
    background: var(--bg-gradient);
    min-height: 100vh;
    color: var(--text-primary);
    transition: background 0.6s ease;
    overflow-x: hidden;
  }

  /* Animated background particles */
  .bg-orbs {
    position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden;
  }
  .bg-orbs .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.3;
    animation: orbFloat 20s ease-in-out infinite;
  }
  .bg-orbs .orb:nth-child(1) {
    width: 400px; height: 400px;
    background: var(--accent);
    top: -10%; left: -5%;
    animation-delay: 0s;
  }
  .bg-orbs .orb:nth-child(2) {
    width: 300px; height: 300px;
    background: var(--success);
    bottom: -10%; right: -5%;
    animation-delay: -7s;
  }
  .bg-orbs .orb:nth-child(3) {
    width: 250px; height: 250px;
    background: var(--timer-ring);
    top: 50%; left: 50%;
    animation-delay: -14s;
  }

  @keyframes orbFloat {
    0%, 100% { transform: translate(0, 0) scale(1); }
    25% { transform: translate(60px, -40px) scale(1.1); }
    50% { transform: translate(-30px, 60px) scale(0.95); }
    75% { transform: translate(40px, 30px) scale(1.05); }
  }

  /* ===== App Container ===== */
  .app {
    position: relative;
    z-index: 1;
    max-width: 520px;
    margin: 0 auto;
    padding: 40px 20px 60px;
    min-height: 100vh;
  }

  /* ===== Header ===== */
  .header {
    text-align: center;
    margin-bottom: 36px;
  }

  .header h1 {
    font-size: 2rem;
    font-weight: 700;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, var(--accent), var(--text-primary));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 4px;
  }

  .header p {
    font-size: 0.85rem;
    color: var(--text-muted);
    font-weight: 400;
  }

  /* ===== Theme Switcher ===== */
  .theme-switcher {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }

  .theme-dot {
    width: 32px; height: 32px;
    border-radius: 50%;
    cursor: pointer;
    border: 3px solid transparent;
    transition: var(--transition);
    position: relative;
  }
  .theme-dot:hover { transform: scale(1.15); }
  .theme-dot.active {
    border-color: var(--text-primary);
    box-shadow: 0 0 0 3px var(--card-bg), 0 0 12px var(--accent-glow);
    transform: scale(1.15);
  }

  .theme-dot[data-set-theme="sunset"]    { background: linear-gradient(135deg, #ff6b6b, #ff8e53); }
  .theme-dot[data-set-theme="ocean"]     { background: linear-gradient(135deg, #667eea, #43e97b); }
  .theme-dot[data-set-theme="lavender"]  { background: linear-gradient(135deg, #a18cd1, #fbc2eb); }
  .theme-dot[data-set-theme="midnight"]  { background: linear-gradient(135deg, #7c5cfc, #b86cfc); }
  .theme-dot[data-set-theme="forest"]    { background: linear-gradient(135deg, #2ecc71, #134e5e); }
  .theme-dot[data-set-theme="sakura"]    { background: linear-gradient(135deg, #ff6b8a, #fcb69f); }

  /* ===== Glass Card ===== */
  .card {
    background: var(--card-bg);
    backdrop-filter: blur(var(--blur));
    -webkit-backdrop-filter: blur(var(--blur));
    border: 1px solid var(--card-border);
    border-radius: var(--radius-lg);
    padding: 28px;
    margin-bottom: 20px;
    box-shadow: var(--shadow-md);
    transition: var(--transition);
  }

  /* ===== Timer Section ===== */
  .timer-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 28px;
  }

  .timer-mode-tabs {
    display: flex;
    gap: 6px;
    background: var(--input-bg);
    border-radius: var(--radius-md);
    padding: 4px;
    margin-bottom: 28px;
  }

  .timer-tab {
    padding: 8px 18px;
    border-radius: 12px;
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--text-muted);
    background: transparent;
    border: none;
    cursor: pointer;
    transition: var(--transition);
  }
  .timer-tab.active {
    background: var(--card-bg);
    color: var(--accent);
    box-shadow: var(--shadow-sm);
  }
  .timer-tab:hover:not(.active) { color: var(--text-secondary); }

  .timer-ring-container {
    position: relative;
    width: 220px;
    height: 220px;
    margin-bottom: 24px;
  }

  .timer-ring-svg {
    width: 100%;
    height: 100%;
    transform: rotate(-90deg);
  }

  .timer-ring-bg {
    fill: none;
    stroke: var(--timer-ring-bg);
    stroke-width: 8;
  }

  .timer-ring-progress {
    fill: none;
    stroke: var(--timer-ring);
    stroke-width: 8;
    stroke-linecap: round;
    transition: stroke-dashoffset 1s linear;
    filter: drop-shadow(0 0 8px var(--accent-glow));
  }

  .timer-display {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .timer-time {
    font-size: 3.2rem;
    font-weight: 700;
    letter-spacing: -2px;
    font-variant-numeric: tabular-nums;
    color: var(--text-primary);
  }

  .timer-label {
    font-size: 0.78rem;
    color: var(--text-muted);
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-top: 2px;
  }

  .timer-controls {
    display: flex;
    gap: 12px;
    align-items: center;
  }

  .btn {
    font-family: var(--font-family);
    font-weight: 600;
    border: none;
    cursor: pointer;
    border-radius: var(--radius-md);
    transition: var(--transition);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .btn-primary {
    background: var(--btn-primary-bg);
    color: var(--btn-primary-text);
    padding: 14px 36px;
    font-size: 0.95rem;
    box-shadow: 0 4px 16px var(--accent-glow);
  }
  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 24px var(--accent-glow);
  }
  .btn-primary:active { transform: translateY(0); }

  .btn-secondary {
    background: var(--input-bg);
    color: var(--text-secondary);
    padding: 14px 20px;
    font-size: 0.95rem;
    border: 1px solid var(--input-border);
  }
  .btn-secondary:hover {
    background: var(--accent-light);
    color: var(--accent);
  }

  .pomodoro-count {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 20px;
    font-size: 0.85rem;
    color: var(--text-muted);
  }

  .pomodoro-count .tomato {
    font-size: 1.1rem;
  }

  /* ===== Todo Section ===== */
  .todo-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .todo-header h2 {
    font-size: 1.25rem;
    font-weight: 700;
  }

  .todo-stats {
    display: flex;
    gap: 14px;
    font-size: 0.78rem;
    color: var(--text-muted);
    font-weight: 500;
  }

  .todo-stats span { display: flex; align-items: center; gap: 4px; }

  .add-todo-row {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
  }

  .add-todo-row input {
    flex: 1;
    padding: 14px 18px;
    background: var(--input-bg);
    border: 1.5px solid var(--input-border);
    border-radius: var(--radius-md);
    font-size: 0.9rem;
    font-family: var(--font-family);
    color: var(--text-primary);
    transition: var(--transition);
    outline: none;
  }
  .add-todo-row input::placeholder { color: var(--text-muted); }
  .add-todo-row input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-light);
  }

  .btn-add {
    width: 50px; height: 50px;
    padding: 0;
    flex-shrink: 0;
    font-size: 1.4rem;
    border-radius: var(--radius-md);
  }

  /* ===== Filter Tabs ===== */
  .filter-tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 16px;
  }

  .filter-tab {
    padding: 6px 14px;
    border-radius: 10px;
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--text-muted);
    background: transparent;
    border: 1.5px solid transparent;
    cursor: pointer;
    transition: var(--transition);
    font-family: var(--font-family);
  }
  .filter-tab.active {
    background: var(--accent-light);
    color: var(--accent);
    border-color: var(--accent-light);
  }
  .filter-tab:hover:not(.active) {
    color: var(--text-secondary);
    background: var(--input-bg);
  }

  /* ===== Todo List ===== */
  .todo-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .todo-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    border-radius: var(--radius-md);
    background: transparent;
    border: 1.5px solid transparent;
    transition: var(--transition);
    animation: slideIn 0.3s ease;
  }
  .todo-item:hover {
    background: var(--input-bg);
  }
  .todo-item.completed {
    background: var(--completed-bg);
    border-color: var(--completed-border);
  }
  .todo-item.completed .todo-text {
    text-decoration: line-through;
    color: var(--text-muted);
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .todo-checkbox {
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 2px solid var(--input-border);
    background: transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: var(--transition);
    font-size: 0.7rem;
    color: transparent;
    padding: 0;
  }
  .todo-item.completed .todo-checkbox {
    background: var(--success);
    border-color: var(--success);
    color: #fff;
  }
  .todo-checkbox:hover {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-light);
  }

  .todo-text {
    flex: 1;
    font-size: 0.9rem;
    color: var(--text-primary);
    transition: var(--transition);
  }

  .todo-pomodoro-badge {
    display: flex;
    align-items: center;
    gap: 3px;
    font-size: 0.72rem;
    color: var(--text-muted);
    background: var(--accent-light);
    padding: 3px 8px;
    border-radius: 8px;
    font-weight: 600;
  }

  .btn-delete {
    width: 28px; height: 28px;
    border-radius: 8px;
    background: transparent;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.85rem;
    transition: var(--transition);
    opacity: 0;
    flex-shrink: 0;
  }
  .todo-item:hover .btn-delete { opacity: 1; }
  .btn-delete:hover {
    background: rgba(255,59,48,0.1);
    color: var(--danger);
  }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-muted);
  }
  .empty-state .emoji { font-size: 2.5rem; margin-bottom: 12px; }
  .empty-state p { font-size: 0.9rem; }

  /* ===== Footer ===== */
  .footer {
    text-align: center;
    margin-top: 32px;
    font-size: 0.75rem;
    color: var(--text-muted);
    opacity: 0.6;
  }

  /* ===== Responsive ===== */
  @media (max-width: 560px) {
    .app { padding: 24px 16px 40px; }
    .card { padding: 22px 18px; border-radius: var(--radius-md); }
    .timer-ring-container { width: 180px; height: 180px; }
    .timer-time { font-size: 2.6rem; }
    .header h1 { font-size: 1.7rem; }
  }

  /* ===== Notification Toast ===== */
  .toast {
    position: fixed;
    top: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(-120px);
    background: var(--card-bg);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--card-border);
    border-radius: var(--radius-md);
    padding: 14px 24px;
    font-size: 0.88rem;
    font-weight: 600;
    color: var(--text-primary);
    box-shadow: var(--shadow-lg);
    z-index: 1000;
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .toast.show {
    transform: translateX(-50%) translateY(0);
  }
</style>
</head>
<body data-theme="sunset">

<!-- Background orbs -->
<div class="bg-orbs">
  <div class="orb"></div>
  <div class="orb"></div>
  <div class="orb"></div>
</div>

<!-- Toast notification -->
<div class="toast" id="toast"></div>

<div class="app">
  <!-- Header -->
  <header class="header">
    <h1>Focusflow</h1>
    <p>Stay focused, get things done.</p>
  </header>

  <!-- Theme Switcher -->
  <div class="theme-switcher">
    <div class="theme-dot active" data-set-theme="sunset" title="Sunset"></div>
    <div class="theme-dot" data-set-theme="ocean" title="Ocean"></div>
    <div class="theme-dot" data-set-theme="lavender" title="Lavender"></div>
    <div class="theme-dot" data-set-theme="midnight" title="Midnight"></div>
    <div class="theme-dot" data-set-theme="forest" title="Forest"></div>
    <div class="theme-dot" data-set-theme="sakura" title="Sakura"></div>
  </div>

  <!-- Timer Card -->
  <div class="card timer-section">
    <div class="timer-mode-tabs">
      <button class="timer-tab active" data-duration="25">Focus</button>
      <button class="timer-tab" data-duration="5">Short Break</button>
      <button class="timer-tab" data-duration="15">Long Break</button>
    </div>

    <div class="timer-ring-container">
      <svg class="timer-ring-svg" viewBox="0 0 220 220">
        <circle class="timer-ring-bg" cx="110" cy="110" r="100" />
        <circle class="timer-ring-progress" id="timerProgress" cx="110" cy="110" r="100"
          stroke-dasharray="628.318"
          stroke-dashoffset="0" />
      </svg>
      <div class="timer-display">
        <div class="timer-time" id="timerTime">25:00</div>
        <div class="timer-label" id="timerLabel">Focus</div>
      </div>
    </div>

    <div class="timer-controls">
      <button class="btn btn-primary" id="btnStart">Start</button>
      <button class="btn btn-secondary" id="btnReset">Reset</button>
    </div>

    <div class="pomodoro-count">
      <span class="tomato">🍅</span>
      <span id="pomodoroCount">0 pomodoros completed today</span>
    </div>
  </div>

  <!-- Todo Card -->
  <div class="card">
    <div class="todo-header">
      <h2>Tasks</h2>
      <div class="todo-stats">
        <span id="statDone">✅ 0 done</span>
        <span id="statPending">📋 0 pending</span>
      </div>
    </div>

    <div class="add-todo-row">
      <input type="text" id="todoInput" placeholder="What are you working on?" maxlength="120" />
      <button class="btn btn-primary btn-add" id="btnAddTodo">+</button>
    </div>

    <div class="filter-tabs">
      <button class="filter-tab active" data-filter="all">All</button>
      <button class="filter-tab" data-filter="active">Active</button>
      <button class="filter-tab" data-filter="completed">Completed</button>
    </div>

    <ul class="todo-list" id="todoList"></ul>
  </div>

  <footer class="footer">
    Focusflow &mdash; Pomodoro Technique meets beautiful design
  </footer>
</div>

<script>
(function() {
  'use strict';

  // ===== State =====
  const CIRCUMFERENCE = 2 * Math.PI * 100; // ~628.318
  let timerDuration = 25 * 60;
  let timeLeft = timerDuration;
  let timerInterval = null;
  let isRunning = false;
  let pomodorosCompleted = 0;
  let activeTodoId = null;

  let todos = JSON.parse(localStorage.getItem('focusflow_todos') || '[]');
  let currentFilter = 'all';
  let currentTheme = localStorage.getItem('focusflow_theme') || 'sunset';

  // ===== DOM Refs =====
  const $ = (sel) => document.querySelector(sel);
  const $$ = (sel) => document.querySelectorAll(sel);

  const timerTime = $('#timerTime');
  const timerLabel = $('#timerLabel');
  const timerProgress = $('#timerProgress');
  const btnStart = $('#btnStart');
  const btnReset = $('#btnReset');
  const pomodoroCountEl = $('#pomodoroCount');
  const todoInput = $('#todoInput');
  const btnAddTodo = $('#btnAddTodo');
  const todoList = $('#todoList');
  const statDone = $('#statDone');
  const statPending = $('#statPending');
  const toastEl = $('#toast');

  // ===== Theme =====
  function setTheme(theme) {
    document.body.setAttribute('data-theme', theme);
    currentTheme = theme;
    localStorage.setItem('focusflow_theme', theme);
    $$('.theme-dot').forEach(d => {
      d.classList.toggle('active', d.dataset.setTheme === theme);
    });
  }

  $$('.theme-dot').forEach(dot => {
    dot.addEventListener('click', () => setTheme(dot.dataset.setTheme));
  });

  setTheme(currentTheme);

  // ===== Toast =====
  function showToast(message, emoji = '🍅') {
    toastEl.innerHTML = `<span>${emoji}</span> ${message}`;
    toastEl.classList.add('show');
    setTimeout(() => toastEl.classList.remove('show'), 3000);
  }

  // ===== Timer =====
  function formatTime(seconds) {
    const m = Math.floor(seconds / 60);
    const s = seconds % 60;
    return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
  }

  function updateTimerDisplay() {
    timerTime.textContent = formatTime(timeLeft);
    const progress = 1 - (timeLeft / timerDuration);
    timerProgress.style.strokeDashoffset = CIRCUMFERENCE * (1 - progress);
  }

  function getActiveTab() {
    return document.querySelector('.timer-tab.active');
  }

  function setTimerMode(duration) {
    if (isRunning) stopTimer();
    timerDuration = duration * 60;
    timeLeft = timerDuration;
    $$('.timer-tab').forEach(t => t.classList.remove('active'));
    document.querySelector(`.timer-tab[data-duration="${duration}"]`).classList.add('active');
    const labels = { 25: 'Focus', 5: 'Short Break', 15: 'Long Break' };
    timerLabel.textContent = labels[duration] || 'Focus';
    updateTimerDisplay();
  }

  function startTimer() {
    if (isRunning) return;
    isRunning = true;
    btnStart.textContent = 'Pause';
    timerInterval = setInterval(() => {
      timeLeft--;
      updateTimerDisplay();
      if (timeLeft <= 0) {
        stopTimer();
        onTimerComplete();
      }
    }, 1000);
  }

  function stopTimer() {
    isRunning = false;
    clearInterval(timerInterval);
    timerInterval = null;
    btnStart.textContent = timeLeft > 0 ? 'Start' : 'Done';
  }

  function resetTimer() {
    stopTimer();
    timeLeft = timerDuration;
    btnStart.textContent = 'Start';
    updateTimerDisplay();
  }

  function onTimerComplete() {
    const activeTab = getActiveTab();
    if (activeTab && activeTab.dataset.duration === '25') {
      pomodorosCompleted++;
      pomodoroCountEl.textContent = `${pomodorosCompleted} pomodoro${pomodorosCompleted !== 1 ? 's' : ''} completed today`;
      // Increment pomodoro count on active todo
      if (activeTodoId !== null) {
        const todo = todos.find(t => t.id === activeTodoId);
        if (todo) {
          todo.pomodoros = (todo.pomodoros || 0) + 1;
          saveTodos();
          renderTodos();
        }
      }
      showToast('Focus session complete! Time for a break.', '🎉');
      // Auto switch to break
      setTimerMode(5);
    } else {
      showToast('Break over! Ready to focus?', '💪');
      setTimerMode(25);
    }
    playNotificationSound();
  }

  function playNotificationSound() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.frequency.setValueAtTime(880, ctx.currentTime);
      osc.frequency.setValueAtTime(1100, ctx.currentTime + 0.15);
      osc.frequency.setValueAtTime(880, ctx.currentTime + 0.3);
      gain.gain.setValueAtTime(0.3, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.5);
    } catch(e) {}
  }

  // Timer events
  btnStart.addEventListener('click', () => {
    isRunning ? stopTimer() : startTimer();
  });
  btnReset.addEventListener('click', resetTimer);
  $$('.timer-tab').forEach(tab => {
    tab.addEventListener('click', () => setTimerMode(Number(tab.dataset.duration)));
  });

  updateTimerDisplay();

  // ===== Todos =====
  function generateId() {
    return Date.now() + Math.random().toString(36).slice(2, 7);
  }

  function saveTodos() {
    localStorage.setItem('focusflow_todos', JSON.stringify(todos));
  }

  function addTodo(text) {
    text = text.trim();
    if (!text) return;
    todos.unshift({
      id: generateId(),
      text,
      completed: false,
      pomodoros: 0,
      createdAt: Date.now()
    });
    saveTodos();
    renderTodos();
  }

  function toggleTodo(id) {
    const todo = todos.find(t => t.id === id);
    if (todo) {
      todo.completed = !todo.completed;
      if (todo.completed && activeTodoId === id) activeTodoId = null;
      saveTodos();
      renderTodos();
    }
  }

  function deleteTodo(id) {
    todos = todos.filter(t => t.id !== id);
    if (activeTodoId === id) activeTodoId = null;
    saveTodos();
    renderTodos();
  }

  function setActiveTodo(id) {
    activeTodoId = activeTodoId === id ? null : id;
    renderTodos();
  }

  function getFilteredTodos() {
    if (currentFilter === 'active') return todos.filter(t => !t.completed);
    if (currentFilter === 'completed') return todos.filter(t => t.completed);
    return todos;
  }

  function renderTodos() {
    const filtered = getFilteredTodos();

    // Stats
    const doneCount = todos.filter(t => t.completed).length;
    const pendingCount = todos.length - doneCount;
    statDone.textContent = `✅ ${doneCount} done`;
    statPending.textContent = `📋 ${pendingCount} pending`;

    if (filtered.length === 0) {
      todoList.innerHTML = `
        <div class="empty-state">
          <div class="emoji">${currentFilter === 'completed' ? '🎯' : '✨'}</div>
          <p>${currentFilter === 'completed' ? 'No completed tasks yet' : currentFilter === 'active' ? 'All tasks completed!' : 'Add your first task above'}</p>
        </div>
      `;
      return;
    }

    todoList.innerHTML = filtered.map(todo => {
      const isActive = activeTodoId === todo.id;
      return `
        <li class="todo-item ${todo.completed ? 'completed' : ''}" data-id="${todo.id}" style="${isActive ? 'background:var(--accent-light);border-color:var(--accent-glow);' : ''}">
          <button class="todo-checkbox" onclick="window.__toggleTodo('${todo.id}')" title="Toggle complete">
            ${todo.completed ? '✓' : ''}
          </button>
          <span class="todo-text" onclick="window.__setActive('${todo.id}')" title="Click to focus on this task" style="cursor:pointer;">${escapeHtml(todo.text)}</span>
          ${todo.pomodoros > 0 ? `<span class="todo-pomodoro-badge">🍅 ${todo.pomodoros}</span>` : ''}
          <button class="btn-delete" onclick="window.__deleteTodo('${todo.id}')" title="Delete">✕</button>
        </li>
      `;
    }).join('');
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  // Expose to inline handlers
  window.__toggleTodo = toggleTodo;
  window.__deleteTodo = deleteTodo;
  window.__setActive = setActiveTodo;

  // Add todo events
  btnAddTodo.addEventListener('click', () => {
    addTodo(todoInput.value);
    todoInput.value = '';
    todoInput.focus();
  });
  todoInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      addTodo(todoInput.value);
      todoInput.value = '';
    }
  });

  // Filter events
  $$('.filter-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      currentFilter = tab.dataset.filter;
      $$('.filter-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      renderTodos();
    });
  });

  // Initial render
  renderTodos();

  // ===== Keyboard Shortcuts =====
  document.addEventListener('keydown', (e) => {
    // Space to toggle timer (when not typing)
    if (e.code === 'Space' && document.activeElement.tagName !== 'INPUT') {
      e.preventDefault();
      isRunning ? stopTimer() : startTimer();
    }
    // R to reset timer
    if (e.code === 'KeyR' && document.activeElement.tagName !== 'INPUT' && !e.metaKey && !e.ctrlKey) {
      resetTimer();
    }
  });

})();
</script>
</body>
</html>
