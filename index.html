<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Focusflow - Pomodoro Todo</title>
<style>
  /* ===== CSS Variables & Themes ===== */
  :root {
    --font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif;
    --radius-sm: 10px;
    --radius-md: 16px;
    --radius-lg: 24px;
    --radius-xl: 32px;
    --shadow-sm: 0 2px 8px rgba(0,0,0,0.06);
    --shadow-md: 0 4px 20px rgba(0,0,0,0.08);
    --shadow-lg: 0 8px 40px rgba(0,0,0,0.12);
    --transition: all 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    --blur: 20px;
  }

  /* Sunset Theme */
  [data-theme="sunset"] {
    --bg-gradient: linear-gradient(145deg, #ff6b6b 0%, #ff8e53 30%, #ffb347 60%, #ff6b9d 100%);
    --card-bg: rgba(255,255,255,0.85);
    --card-border: rgba(255,255,255,0.5);
    --text-primary: #2d1b1b;
    --text-secondary: #6b4a4a;
    --text-muted: #9a7a7a;
    --accent: #ff6b6b;
    --accent-light: rgba(255,107,107,0.12);
    --accent-glow: rgba(255,107,107,0.3);
    --success: #34c759;
    --danger: #ff3b30;
    --input-bg: rgba(255,255,255,0.7);
    --input-border: rgba(255,107,107,0.3);
    --timer-ring: #ff6b6b;
    --timer-ring-bg: rgba(255,107,107,0.15);
    --btn-primary-bg: linear-gradient(135deg, #ff6b6b, #ff8e53);
    --btn-primary-text: #fff;
    --completed-bg: rgba(52,199,89,0.08);
    --completed-border: rgba(52,199,89,0.2);
    --theme-dot: linear-gradient(135deg, #ff6b6b, #ff8e53);
  }

  /* Ocean Theme */
  [data-theme="ocean"] {
    --bg-gradient: linear-gradient(145deg, #667eea 0%, #43e97b 50%, #38f9d7 100%);
    --card-bg: rgba(255,255,255,0.85);
    --card-border: rgba(255,255,255,0.5);
    --text-primary: #1a2a4a;
    --text-secondary: #4a5a7a;
    --text-muted: #7a8aaa;
    --accent: #667eea;
    --accent-light: rgba(102,126,234,0.12);
    --accent-glow: rgba(102,126,234,0.3);
    --success: #34c759;
    --danger: #ff3b30;
    --input-bg: rgba(255,255,255,0.7);
    --input-border: rgba(102,126,234,0.3);
    --timer-ring: #667eea;
    --timer-ring-bg: rgba(102,126,234,0.15);
    --btn-primary-bg: linear-gradient(135deg, #667eea, #43e97b);
    --btn-primary-text: #fff;
    --completed-bg: rgba(52,199,89,0.08);
    --completed-border: rgba(52,199,89,0.2);
    --theme-dot: linear-gradient(135deg, #667eea, #43e97b);
  }

  /* Lavender Theme */
  [data-theme="lavender"] {
    --bg-gradient: linear-gradient(145deg, #a18cd1 0%, #fbc2eb 50%, #f6d365 100%);
    --card-bg: rgba(255,255,255,0.85);
    --card-border: rgba(255,255,255,0.5);
    --text-primary: #2a1a3a;
    --text-secondary: #5a4a6a;
    --text-muted: #8a7a9a;
    --accent: #a18cd1;
    --accent-light: rgba(161,140,209,0.12);
    --accent-glow: rgba(161,140,209,0.3);
    --success: #34c759;
    --danger: #ff3b30;
    --input-bg: rgba(255,255,255,0.7);
    --input-border: rgba(161,140,209,0.3);
    --timer-ring: #a18cd1;
    --timer-ring-bg: rgba(161,140,209,0.15);
    --btn-primary-bg: linear-gradient(135deg, #a18cd1, #fbc2eb);
    --btn-primary-text: #fff;
    --completed-bg: rgba(52,199,89,0.08);
    --completed-border: rgba(52,199,89,0.2);
    --theme-dot: linear-gradient(135deg, #a18cd1, #fbc2eb);
  }

  /* Midnight Theme (Dark) */
  [data-theme="midnight"] {
    --bg-gradient: linear-gradient(145deg, #0c0c1d 0%, #1a1a3e 40%, #2d1b69 70%, #0c0c1d 100%);
    --card-bg: rgba(30,30,60,0.85);
    --card-border: rgba(255,255,255,0.08);
    --text-primary: #f0f0ff;
    --text-secondary: #b0b0d0;
    --text-muted: #707090;
    --accent: #7c5cfc;
    --accent-light: rgba(124,92,252,0.15);
    --accent-glow: rgba(124,92,252,0.4);
    --success: #30d158;
    --danger: #ff453a;
    --input-bg: rgba(255,255,255,0.06);
    --input-border: rgba(124,92,252,0.3);
    --timer-ring: #7c5cfc;
    --timer-ring-bg: rgba(124,92,252,0.15);
    --btn-primary-bg: linear-gradient(135deg, #7c5cfc, #b86cfc);
    --btn-primary-text: #fff;
    --completed-bg: rgba(48,209,88,0.1);
    --completed-border: rgba(48,209,88,0.2);
    --theme-dot: linear-gradient(135deg, #7c5cfc, #b86cfc);
  }

  /* Forest Theme */
  [data-theme="forest"] {
    --bg-gradient: linear-gradient(145deg, #134e5e 0%, #2ecc71 40%, #71b280 70%, #134e5e 100%);
    --card-bg: rgba(255,255,255,0.85);
    --card-border: rgba(255,255,255,0.5);
    --text-primary: #0a2a1a;
    --text-secondary: #3a5a4a;
    --text-muted: #6a8a7a;
    --accent: #2ecc71;
    --accent-light: rgba(46,204,113,0.12);
    --accent-glow: rgba(46,204,113,0.3);
    --success: #27ae60;
    --danger: #e74c3c;
    --input-bg: rgba(255,255,255,0.7);
    --input-border: rgba(46,204,113,0.3);
    --timer-ring: #2ecc71;
    --timer-ring-bg: rgba(46,204,113,0.15);
    --btn-primary-bg: linear-gradient(135deg, #2ecc71, #134e5e);
    --btn-primary-text: #fff;
    --completed-bg: rgba(46,204,113,0.08);
    --completed-border: rgba(46,204,113,0.2);
    --theme-dot: linear-gradient(135deg, #2ecc71, #134e5e);
  }

  /* Cherry Blossom Theme */
  [data-theme="sakura"] {
    --bg-gradient: linear-gradient(145deg, #ffecd2 0%, #fcb69f 30%, #ff9a9e 60%, #fecfef 100%);
    --card-bg: rgba(255,255,255,0.88);
    --card-border: rgba(255,255,255,0.6);
    --text-primary: #3d1a2a;
    --text-secondary: #7a4a5a;
    --text-muted: #b07a8a;
    --accent: #ff6b8a;
    --accent-light: rgba(255,107,138,0.12);
    --accent-glow: rgba(255,107,138,0.3);
    --success: #34c759;
    --danger: #ff3b30;
    --input-bg: rgba(255,255,255,0.7);
    --input-border: rgba(255,107,138,0.3);
    --timer-ring: #ff6b8a;
    --timer-ring-bg: rgba(255,107,138,0.15);
    --btn-primary-bg: linear-gradient(135deg, #ff6b8a, #fcb69f);
    --btn-primary-text: #fff;
    --completed-bg: rgba(52,199,89,0.08);
    --completed-border: rgba(52,199,89,0.2);
    --theme-dot: linear-gradient(135deg, #ff6b8a, #fcb69f);
  }

  /* ===== Reset & Base ===== */
  *, *::before, *::after {
    margin: 0; padding: 0; box-sizing: border-box;
  }

  html { font-size: 16px; -webkit-font-smoothing: antialiased; }

  body {
    font-family: var(--font-family);
    background: var(--bg-gradient);
    min-height: 100vh;
    color: var(--text-primary);
    transition: background 0.6s ease;
    overflow-x: hidden;
  }

  /* Animated background particles */
  .bg-orbs {
    position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden;
  }
  .bg-orbs .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.3;
    animation: orbFloat 20s ease-in-out infinite;
  }
  .bg-orbs .orb:nth-child(1) {
    width: 400px; height: 400px;
    background: var(--accent);
    top: -10%; left: -5%;
    animation-delay: 0s;
  }
  .bg-orbs .orb:nth-child(2) {
    width: 300px; height: 300px;
    background: var(--success);
    bottom: -10%; right: -5%;
    animation-delay: -7s;
  }
  .bg-orbs .orb:nth-child(3) {
    width: 250px; height: 250px;
    background: var(--timer-ring);
    top: 50%; left: 50%;
    animation-delay: -14s;
  }

  @keyframes orbFloat {
    0%, 100% { transform: translate(0, 0) scale(1); }
    25% { transform: translate(60px, -40px) scale(1.1); }
    50% { transform: translate(-30px, 60px) scale(0.95); }
    75% { transform: translate(40px, 30px) scale(1.05); }
  }

  /* ===== App Container ===== */
  .app {
    position: relative;
    z-index: 1;
    max-width: 520px;
    margin: 0 auto;
    padding: 40px 20px 60px;
    min-height: 100vh;
  }

  /* ===== Header ===== */
  .header {
    text-align: center;
    margin-bottom: 36px;
  }

  .header h1 {
    font-size: 2rem;
    font-weight: 700;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, var(--accent), var(--text-primary));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 4px;
  }

  .header p {
    font-size: 0.85rem;
    color: var(--text-muted);
    font-weight: 400;
  }

  /* ===== Theme Switcher ===== */
  .theme-switcher {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }

  .theme-dot {
    width: 32px; height: 32px;
    border-radius: 50%;
    cursor: pointer;
    border: 3px solid transparent;
    transition: var(--transition);
    position: relative;
  }
  .theme-dot:hover { transform: scale(1.15); }
  .theme-dot.active {
    border-color: var(--text-primary);
    box-shadow: 0 0 0 3px var(--card-bg), 0 0 12px var(--accent-glow);
    transform: scale(1.15);
  }

  .theme-dot[data-set-theme="sunset"]    { background: linear-gradient(135deg, #ff6b6b, #ff8e53); }
  .theme-dot[data-set-theme="ocean"]     { background: linear-gradient(135deg, #667eea, #43e97b); }
  .theme-dot[data-set-theme="lavender"]  { background: linear-gradient(135deg, #a18cd1, #fbc2eb); }
  .theme-dot[data-set-theme="midnight"]  { background: linear-gradient(135deg, #7c5cfc, #b86cfc); }
  .theme-dot[data-set-theme="forest"]    { background: linear-gradient(135deg, #2ecc71, #134e5e); }
  .theme-dot[data-set-theme="sakura"]    { background: linear-gradient(135deg, #ff6b8a, #fcb69f); }

  /* ===== Glass Card ===== */
  .card {
    background: var(--card-bg);
    backdrop-filter: blur(var(--blur));
    -webkit-backdrop-filter: blur(var(--blur));
    border: 1px solid var(--card-border);
    border-radius: var(--radius-lg);
    padding: 28px;
    margin-bottom: 20px;
    box-shadow: var(--shadow-md);
    transition: var(--transition);
  }

  /* ===== Timer Section ===== */
  .timer-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 28px;
  }

  .timer-mode-tabs {
    display: flex;
    gap: 6px;
    background: var(--input-bg);
    border-radius: var(--radius-md);
    padding: 4px;
    margin-bottom: 28px;
  }

  .timer-tab {
    padding: 8px 18px;
    border-radius: 12px;
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--text-muted);
    background: transparent;
    border: none;
    cursor: pointer;
    transition: var(--transition);
  }
  .timer-tab.active {
    background: var(--card-bg);
    color: var(--accent);
    box-shadow: var(--shadow-sm);
  }
  .timer-tab:hover:not(.active) { color: var(--text-secondary); }

  .timer-ring-container {
    position: relative;
    width: 220px;
    height: 220px;
    margin-bottom: 24px;
  }

  .timer-ring-svg {
    width: 100%;
    height: 100%;
    transform: rotate(-90deg);
  }

  .timer-ring-bg {
    fill: none;
    stroke: var(--timer-ring-bg);
    stroke-width: 8;
  }

  .timer-ring-progress {
    fill: none;
    stroke: var(--timer-ring);
    stroke-width: 8;
    stroke-linecap: round;
    transition: stroke-dashoffset 1s linear;
    filter: drop-shadow(0 0 8px var(--accent-glow));
  }

  .timer-display {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .timer-time {
    font-size: 3.2rem;
    font-weight: 700;
    letter-spacing: -2px;
    font-variant-numeric: tabular-nums;
    color: var(--text-primary);
  }

  .timer-label {
    font-size: 0.78rem;
    color: var(--text-muted);
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-top: 2px;
  }

  .timer-controls {
    display: flex;
    gap: 12px;
    align-items: center;
  }

  .btn {
    font-family: var(--font-family);
    font-weight: 600;
    border: none;
    cursor: pointer;
    border-radius: var(--radius-md);
    transition: var(--transition);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .btn-primary {
    background: var(--btn-primary-bg);
    color: var(--btn-primary-text);
    padding: 14px 36px;
    font-size: 0.95rem;
    box-shadow: 0 4px 16px var(--accent-glow);
  }
  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 24px var(--accent-glow);
  }
  .btn-primary:active { transform: translateY(0); }

  .btn-secondary {
    background: var(--input-bg);
    color: var(--text-secondary);
    padding: 14px 20px;
    font-size: 0.95rem;
    border: 1px solid var(--input-border);
  }
  .btn-secondary:hover {
    background: var(--accent-light);
    color: var(--accent);
  }

  .pomodoro-count {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 20px;
    font-size: 0.85rem;
    color: var(--text-muted);
  }

  .pomodoro-count .tomato {
    font-size: 1.1rem;
  }

  /* ===== Todo Section ===== */
  .todo-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .todo-header h2 {
    font-size: 1.25rem;
    font-weight: 700;
  }

  .todo-stats {
    display: flex;
    gap: 14px;
    font-size: 0.78rem;
    color: var(--text-muted);
    font-weight: 500;
  }

  .todo-stats span { display: flex; align-items: center; gap: 4px; }

  .add-todo-row {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
  }

  .add-todo-row input {
    flex: 1;
    padding: 14px 18px;
    background: var(--input-bg);
    border: 1.5px solid var(--input-border);
    border-radius: var(--radius-md);
    font-size: 0.9rem;
    font-family: var(--font-family);
    color: var(--text-primary);
    transition: var(--transition);
    outline: none;
  }
  .add-todo-row input::placeholder { color: var(--text-muted); }
  .add-todo-row input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-light);
  }

  .btn-add {
    width: 50px; height: 50px;
    padding: 0;
    flex-shrink: 0;
    font-size: 1.4rem;
    border-radius: var(--radius-md);
  }

  /* ===== Filter Tabs ===== */
  .filter-tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 16px;
  }

  .filter-tab {
    padding: 6px 14px;
    border-radius: 10px;
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--text-muted);
    background: transparent;
    border: 1.5px solid transparent;
    cursor: pointer;
    transition: var(--transition);
    font-family: var(--font-family);
  }
  .filter-tab.active {
    background: var(--accent-light);
    color: var(--accent);
    border-color: var(--accent-light);
  }
  .filter-tab:hover:not(.active) {
    color: var(--text-secondary);
    background: var(--input-bg);
  }

  /* ===== Todo List ===== */
  .todo-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .todo-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    border-radius: var(--radius-md);
    background: transparent;
    border: 1.5px solid transparent;
    transition: var(--transition);
    animation: slideIn 0.3s ease;
  }
  .todo-item:hover {
    background: var(--input-bg);
  }
  .todo-item.completed {
    background: var(--completed-bg);
    border-color: var(--completed-border);
  }
  .todo-item.completed .todo-text {
    text-decoration: line-through;
    color: var(--text-muted);
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .todo-checkbox {
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 2px solid var(--input-border);
    background: transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: var(--transition);
    font-size: 0.7rem;
    color: transparent;
    padding: 0;
  }
  .todo-item.completed .todo-checkbox {
    background: var(--success);
    border-color: var(--success);
    color: #fff;
  }
  .todo-checkbox:hover {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-light);
  }

  .todo-text {
    flex: 1;
    font-size: 0.9rem;
    color: var(--text-primary);
    transition: var(--transition);
  }

  .todo-pomodoro-badge {
    display: flex;
    align-items: center;
    gap: 3px;
    font-size: 0.72rem;
    color: var(--text-muted);
    background: var(--accent-light);
    padding: 3px 8px;
    border-radius: 8px;
    font-weight: 600;
  }

  .btn-delete {
    width: 28px; height: 28px;
    border-radius: 8px;
    background: transparent;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.85rem;
    transition: var(--transition);
    opacity: 0;
    flex-shrink: 0;
  }
  .todo-item:hover .btn-delete { opacity: 1; }
  .btn-delete:hover {
    background: rgba(255,59,48,0.1);
    color: var(--danger);
  }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-muted);
  }
  .empty-state .emoji { font-size: 2.5rem; margin-bottom: 12px; }
  .empty-state p { font-size: 0.9rem; }

  /* ===== Settings Gear ===== */
  .settings-gear {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 100;
    width: 44px; height: 44px;
    border-radius: 50%;
    background: var(--card-bg);
    backdrop-filter: blur(var(--blur));
    -webkit-backdrop-filter: blur(var(--blur));
    border: 1px solid var(--card-border);
    box-shadow: var(--shadow-md);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: var(--transition);
    font-size: 1.2rem;
    color: var(--text-secondary);
  }
  .settings-gear:hover {
    transform: rotate(60deg) scale(1.1);
    color: var(--accent);
    box-shadow: var(--shadow-lg);
  }

  /* ===== Settings Panel ===== */
  .settings-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.3);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    z-index: 200;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
  }
  .settings-overlay.open {
    opacity: 1;
    pointer-events: auto;
  }

  .settings-panel {
    position: fixed;
    top: 0;
    right: -400px;
    width: 360px;
    max-width: 90vw;
    height: 100vh;
    background: var(--card-bg);
    backdrop-filter: blur(40px);
    -webkit-backdrop-filter: blur(40px);
    border-left: 1px solid var(--card-border);
    box-shadow: -8px 0 40px rgba(0,0,0,0.15);
    z-index: 300;
    padding: 32px 28px;
    overflow-y: auto;
    transition: right 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }
  .settings-panel.open {
    right: 0;
  }

  .settings-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 32px;
  }
  .settings-header h2 {
    font-size: 1.35rem;
    font-weight: 700;
  }
  .settings-close {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: var(--input-bg);
    border: 1px solid var(--input-border);
    color: var(--text-secondary);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
    transition: var(--transition);
  }
  .settings-close:hover {
    background: var(--accent-light);
    color: var(--accent);

    transition: var(--transition);
    font-family: var(--font-family);
    font-size: 0.88rem;
    font-weight: 500;
    color: var(--text-primary);
    width: 100%;
    text-align: left;
  }
  .ringtone-option:hover {
    background: var(--input-bg);
  }
  .ringtone-option.active {
    background: var(--accent-light);
    border-color: var(--accent-glow);
    color: var(--accent);
  }
  .ringtone-option .ring-icon {
    width: 32px; height: 32px;
    border-radius: 8px;
    background: var(--input-bg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.95rem;
    flex-shrink: 0;
  }
  .ringtone-option.active .ring-icon {
    background: var(--accent);
    color: #fff;
  }
  .ringtone-option .ring-info {
    flex: 1;
  }
  .ringtone-option .ring-name {
    font-weight: 600;
    font-size: 0.85rem;
  }
  .ringtone-option .ring-desc {
    font-size: 0.72rem;
    color: var(--text-muted);
    font-weight: 400;
  }
  .ringtone-option .ring-preview-btn {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: var(--input-bg);
    border: 1px solid var(--input-border);
    color: var(--text-muted);

    align-items: center;

  .ringtone-option .ring-preview-btn:hover {
    background: var(--accent-light);

  .volume-control {

    align-items: center;

    -webkit-appearance: none;

  .volume-slider::-webkit-slider-thumb {

    width: 20px; height: 20px;

  /* ===== Footer ===== */

  /* ===== Responsive ===== */
  @media (max-width: 560px) {
    .app { padding: 24px 16px 40px; }
    .card { padding: 22px 18px; border-radius: var(--radius-md); }
    .timer-ring-container { width: 180px; height: 180px; }
    .timer-time { font-size: 2.6rem; }

  /* ===== Notification Toast ===== */

    transform: translateX(-50%) translateY(-120px);

    display: flex;

  }
  .toast.show {
    transform: translateX(-50%) translateY(0);

</style>
</head>

<script>
(function() {
  'use strict';

  // ===== Ringtone Definitions (Web Audio API synthesized) =====
  const RINGTONES = [
    {
      id: 'classic',
      name: 'Classic Chime',
      desc: 'Gentle ascending bells',
      icon: '🔔',
      play: function(ctx, vol) {
        const t = ctx.currentTime;
        [523.25, 659.25, 783.99].forEach((freq, i) => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = 'sine';
          osc.frequency.setValueAtTime(freq, t + i * 0.18);
          gain.gain.setValueAtTime(0, t + i * 0.18);
          gain.gain.linearRampToValueAtTime(vol * 0.35, t + i * 0.18 + 0.02);
          gain.gain.exponentialRampToValueAtTime(0.001, t + i * 0.18 + 0.6);
          osc.connect(gain).connect(ctx.destination);
          osc.start(t + i * 0.18);
          osc.stop(t + i * 0.18 + 0.7);
        });
      }
    },
    {
      id: 'digital',
      name: 'Digital Beep',
      desc: 'Sharp electronic pulse',
      icon: '💻',
      play: function(ctx, vol) {
        const t = ctx.currentTime;
        [0, 0.15, 0.3].forEach(offset => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = 'square';
          osc.frequency.setValueAtTime(880, t + offset);
          gain.gain.setValueAtTime(vol * 0.2, t + offset);
          gain.gain.exponentialRampToValueAtTime(0.001, t + offset + 0.12);
          osc.connect(gain).connect(ctx.destination);
          osc.start(t + offset);
          osc.stop(t + offset + 0.15);
        });
      }
    },
    {
      id: 'melody',
      name: 'Happy Melody',
      desc: 'Cheerful ascending tune',
      icon: '🎵',
      play: function(ctx, vol) {
        const t = ctx.currentTime;
        const notes = [392, 440, 523.25, 659.25, 783.99];
        notes.forEach((freq, i) => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = 'triangle';
          osc.frequency.setValueAtTime(freq, t + i * 0.12);
          gain.gain.setValueAtTime(0, t + i * 0.12);
          gain.gain.linearRampToValueAtTime(vol * 0.3, t + i * 0.12 + 0.01);
          gain.gain.exponentialRampToValueAtTime(0.001, t + i * 0.12 + 0.4);
          osc.connect(gain).connect(ctx.destination);
          osc.start(t + i * 0.12);
          osc.stop(t + i * 0.12 + 0.5);
        });
      }
    },
    {
      id: 'gentle',
      name: 'Gentle Wind',
      desc: 'Soft ambient tone',
      icon: '🍃',
      play: function(ctx, vol) {
        const t = ctx.currentTime;
        const osc1 = ctx.createOscillator();
        const osc2 = ctx.createOscillator();
        const gain = ctx.createGain();
        osc1.type = 'sine';
        osc2.type = 'sine';
        osc1.frequency.setValueAtTime(440, t);
        osc2.frequency.setValueAtTime(554.37, t);
        gain.gain.setValueAtTime(0, t);
        gain.gain.linearRampToValueAtTime(vol * 0.25, t + 0.3);
        gain.gain.linearRampToValueAtTime(vol * 0.25, t + 0.8);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 1.5);
        osc1.connect(gain);
        osc2.connect(gain);
        gain.connect(ctx.destination);
        osc1.start(t);
        osc2.start(t);
        osc1.stop(t + 1.6);
        osc2.stop(t + 1.6);
      }
    },
    {
      id: 'alert',
      name: 'Urgent Alert',
      desc: 'Attention-grabbing alarm',
      icon: '🚨',
      play: function(ctx, vol) {
        const t = ctx.currentTime;
        for (let i = 0; i < 4; i++) {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = 'sawtooth';
          osc.frequency.setValueAtTime(i % 2 === 0 ? 660 : 880, t + i * 0.15);
          gain.gain.setValueAtTime(vol * 0.15, t + i * 0.15);
          gain.gain.exponentialRampToValueAtTime(0.001, t + i * 0.15 + 0.12);
          osc.connect(gain).connect(ctx.destination);
          osc.start(t + i * 0.15);
          osc.stop(t + i * 0.15 + 0.15);
        }
      }
    },
    {
      id: 'piano',
      name: 'Piano Keys',
      desc: 'Elegant piano arpeggio',
      icon: '🎹',
      play: function(ctx, vol) {
        const t = ctx.currentTime;
        const notes = [261.63, 329.63, 392, 523.25];
        notes.forEach((freq, i) => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = 'sine';
          osc.frequency.setValueAtTime(freq, t + i * 0.15);
          // Add harmonics for piano-like sound
          const osc2 = ctx.createOscillator();
          osc2.type = 'sine';
          osc2.frequency.setValueAtTime(freq * 2, t + i * 0.15);
          const gain2 = ctx.createGain();
          gain2.gain.setValueAtTime(0, t + i * 0.15);
          gain2.gain.linearRampToValueAtTime(vol * 0.1, t + i * 0.15 + 0.01);
          gain2.gain.exponentialRampToValueAtTime(0.001, t + i * 0.15 + 0.8);
          osc2.connect(gain2).connect(ctx.destination);
          osc2.start(t + i * 0.15);
          osc2.stop(t + i * 0.15 + 0.9);

          gain.gain.setValueAtTime(0, t + i * 0.15);
          gain.gain.linearRampToValueAtTime(vol * 0.3, t + i * 0.15 + 0.01);
          gain.gain.exponentialRampToValueAtTime(0.001, t + i * 0.15 + 0.9);
          osc.connect(gain).connect(ctx.destination);
          osc.start(t + i * 0.15);
          osc.stop(t + i * 0.15 + 1.0);
        });
      }
    },
    {
      id: 'bird',
      name: 'Bird Song',
      desc: 'Nature-inspired chirps',
      icon: '🐦',
      play: function(ctx, vol) {
        const t = ctx.currentTime;
        const chirps = [
          { start: 0, freq: 1200, endFreq: 1800, dur: 0.15 },
          { start: 0.2, freq: 1500, endFreq: 2000, dur: 0.12 },
          { start: 0.38, freq: 1000, endFreq: 1600, dur: 0.18 },
          { start: 0.62, freq: 1400, endFreq: 2200, dur: 0.1 },
        ];
        chirps.forEach(c => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = 'sine';
          osc.frequency.setValueAtTime(c.freq, t + c.start);
          osc.frequency.linearRampToValueAtTime(c.endFreq, t + c.start + c.dur);
          gain.gain.setValueAtTime(0, t + c.start);
          gain.gain.linearRampToValueAtTime(vol * 0.2, t + c.start + 0.01);
          gain.gain.exponentialRampToValueAtTime(0.001, t + c.start + c.dur + 0.05);
          osc.connect(gain).connect(ctx.destination);
          osc.start(t + c.start);
          osc.stop(t + c.start + c.dur + 0.1);
        });
      }
    },
    {
      id: 'bubble',
      name: 'Bubble Pop',
      desc: 'Fun popping sounds',
      icon: '🫧',
      play: function(ctx, vol) {
        const t = ctx.currentTime;
        [0, 0.12, 0.24, 0.36].forEach((offset, i) => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = 'sine';
          const baseFreq = 400 + i * 200;
          osc.frequency.setValueAtTime(baseFreq, t + offset);
          osc.frequency.exponentialRampToValueAtTime(baseFreq * 1.5, t + offset + 0.06);
          gain.gain.setValueAtTime(vol * 0.3, t + offset);
          gain.gain.exponentialRampToValueAtTime(0.001, t + offset + 0.1);
          osc.connect(gain).connect(ctx.destination);
          osc.start(t + offset);
          osc.stop(t + offset + 0.12);
        });
      }
    }
  ];

  // ===== State =====
  const CIRCUMFERENCE = 2 * Math.PI * 100;
  let timerDurations = JSON.parse(localStorage.getItem('focusflow_durations') || '{"focus":25,"short":5,"long":15}');
  let currentMode = 'focus';
  let timerDuration = timerDurations[currentMode] * 60;
  let timeLeft = timerDuration;
  let timerInterval = null;
  let isRunning = false;
  let pomodorosCompleted = 0;
  let activeTodoId = null;

  let todos = JSON.parse(localStorage.getItem('focusflow_todos') || '[]');
  let currentFilter = 'all';
  let currentTheme = localStorage.getItem('focusflow_theme') || 'sunset';
  let currentRingtone = localStorage.getItem('focusflow_ringtone') || 'classic';
  let volume = parseInt(localStorage.getItem('focusflow_volume') || '70', 10);

  // ===== DOM Refs =====
  const $ = (sel) => document.querySelector(sel);
  const $$ = (sel) => document.querySelectorAll(sel);

  const timerTime = $('#timerTime');
  const timerLabel = $('#timerLabel');
  const timerProgress = $('#timerProgress');
  const btnStart = $('#btnStart');
  const btnReset = $('#btnReset');
  const pomodoroCountEl = $('#pomodoroCount');
  const todoInput = $('#todoInput');
  const btnAddTodo = $('#btnAddTodo');
  const todoList = $('#todoList');
  const statDone = $('#statDone');
  const statPending = $('#statPending');
  const toastEl = $('#toast');

  // Settings DOM
  const settingsGear = $('#settingsGear');
  const settingsOverlay = $('#settingsOverlay');
  const settingsPanel = $('#settingsPanel');
  const settingsClose = $('#settingsClose');
  const customFocus = $('#customFocus');
  const customShort = $('#customShort');
  const customLong = $('#customLong');
  const btnApplyTime = $('#btnApplyTime');
  const ringtoneList = $('#ringtoneList');
  const volumeSlider = $('#volumeSlider');
  const volumeValue = $('#volumeValue');

  // ===== Theme =====
  function setTheme(theme) {
    document.body.setAttribute('data-theme', theme);
    currentTheme = theme;
    localStorage.setItem('focusflow_theme', theme);
    $$('.theme-dot').forEach(d => {
      d.classList.toggle('active', d.dataset.setTheme === theme);
    });
  }

  $$('.theme-dot').forEach(dot => {
    dot.addEventListener('click', () => setTheme(dot.dataset.setTheme));
  });

  setTheme(currentTheme);

  // ===== Toast =====
  function showToast(message, emoji = '🍅') {
    toastEl.innerHTML = `<span>${emoji}</span> ${message}`;
    toastEl.classList.add('show');
    setTimeout(() => toastEl.classList.remove('show'), 3000);
  }

  // ===== Settings Panel =====
  function openSettings() {
    settingsOverlay.classList.add('open');
    settingsPanel.classList.add('open');
  }
  function closeSettings() {
    settingsOverlay.classList.remove('open');
    settingsPanel.classList.remove('open');
  }

  settingsGear.addEventListener('click', openSettings);
  settingsOverlay.addEventListener('click', closeSettings);
  settingsClose.addEventListener('click', closeSettings);

  // Load custom times into inputs
  customFocus.value = timerDurations.focus;
  customShort.value = timerDurations.short;
  customLong.value = timerDurations.long;

  btnApplyTime.addEventListener('click', () => {
    const focus = Math.max(1, Math.min(120, parseInt(customFocus.value) || 25));
    const short = Math.max(1, Math.min(30, parseInt(customShort.value) || 5));
    const long = Math.max(1, Math.min(60, parseInt(customLong.value) || 15));

    customFocus.value = focus;
    customShort.value = short;
    customLong.value = long;

    timerDurations = { focus, short, long };
    localStorage.setItem('focusflow_durations', JSON.stringify(timerDurations));

    // Update tab labels
    document.querySelector('.timer-tab[data-mode="focus"]').textContent = `${focus}m`;
    document.querySelector('.timer-tab[data-mode="short"]').textContent = `${short}m`;
    document.querySelector('.timer-tab[data-mode="long"]').textContent = `${long}m`;

    // Reset current timer with new duration
    if (isRunning) stopTimer();
    timerDuration = timerDurations[currentMode] * 60;
    timeLeft = timerDuration;
    btnStart.textContent = 'Start';
    updateTimerDisplay();

    showToast(`Timer updated: ${focus}m / ${short}m / ${long}m`, '⏱️');
    closeSettings();
  });

  // ===== Ringtone UI =====
  function renderRingtones() {
    ringtoneList.innerHTML = RINGTONES.map(rt => `
      <button class="ringtone-option ${currentRingtone === rt.id ? 'active' : ''}" data-ring-id="${rt.id}">
        <div class="ring-icon">${rt.icon}</div>
        <div class="ring-info">
          <div class="ring-name">${rt.name}</div>
          <div class="ring-desc">${rt.desc}</div>
        </div>
        <div class="ring-preview-btn" data-preview-id="${rt.id}" title="Preview">▶</div>
      </button>
    `).join('');

    // Click to select
    ringtoneList.querySelectorAll('.ringtone-option').forEach(opt => {
      opt.addEventListener('click', (e) => {
        // Don't select if clicking preview button
        if (e.target.closest('.ring-preview-btn')) return;
        currentRingtone = opt.dataset.ringId;
        localStorage.setItem('focusflow_ringtone', currentRingtone);
        renderRingtones();
      });
    });

    // Preview buttons
    ringtoneList.querySelectorAll('.ring-preview-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        previewRingtone(btn.dataset.previewId);
      });
    });
  }

  function previewRingtone(id) {
    const rt = RINGTONES.find(r => r.id === id);
    if (!rt) return;
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      rt.play(ctx, volume / 100);
    } catch(e) {}
  }

  renderRingtones();

  // Volume
  volumeSlider.value = volume;
  volumeValue.textContent = volume + '%';
  volumeSlider.addEventListener('input', () => {
    volume = parseInt(volumeSlider.value, 10);
    volumeValue.textContent = volume + '%';
    localStorage.setItem('focusflow_volume', String(volume));
  });

  // ===== Timer =====
  function formatTime(seconds) {
    const m = Math.floor(seconds / 60);
    const s = seconds % 60;
    return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
  }

  function updateTimerDisplay() {
    timerTime.textContent = formatTime(timeLeft);
    const progress = 1 - (timeLeft / timerDuration);
    timerProgress.style.strokeDashoffset = CIRCUMFERENCE * (1 - progress);
  }

  function setTimerMode(mode) {
    if (isRunning) stopTimer();
    currentMode = mode;
    timerDuration = timerDurations[mode] * 60;
    timeLeft = timerDuration;
    $$('.timer-tab').forEach(t => t.classList.remove('active'));
    document.querySelector(`.timer-tab[data-mode="${mode}"]`).classList.add('active');
    const labels = { focus: 'Focus', short: 'Short Break', long: 'Long Break' };
    timerLabel.textContent = labels[mode] || 'Focus';
    btnStart.textContent = 'Start';
    updateTimerDisplay();
  }

  // Initialize tab labels with custom durations
  document.querySelector('.timer-tab[data-mode="focus"]').textContent = `${timerDurations.focus}m`;
  document.querySelector('.timer-tab[data-mode="short"]').textContent = `${timerDurations.short}m`;
  document.querySelector('.timer-tab[data-mode="long"]').textContent = `${timerDurations.long}m`;

  function startTimer() {
    if (isRunning) return;
    isRunning = true;
    btnStart.textContent = 'Pause';
    timerInterval = setInterval(() => {
      timeLeft--;
      updateTimerDisplay();
      if (timeLeft <= 0) {
        stopTimer();
        onTimerComplete();
      }
    }, 1000);
  }

  function stopTimer() {
    isRunning = false;
    clearInterval(timerInterval);
    timerInterval = null;
    btnStart.textContent = timeLeft > 0 ? 'Start' : 'Done';
  }

  function resetTimer() {
    stopTimer();
    timeLeft = timerDuration;
    btnStart.textContent = 'Start';
    updateTimerDisplay();
  }

  function onTimerComplete() {
    if (currentMode === 'focus') {
      pomodorosCompleted++;
      pomodoroCountEl.textContent = `${pomodorosCompleted} pomodoro${pomodorosCompleted !== 1 ? 's' : ''} completed today`;
      if (activeTodoId !== null) {
        const todo = todos.find(t => t.id === activeTodoId);
        if (todo) {
          todo.pomodoros = (todo.pomodoros || 0) + 1;
          saveTodos();
          renderTodos();
        }
      }
      showToast('Focus session complete! Time for a break.', '🎉');
      setTimerMode('short');
    } else {
      showToast('Break over! Ready to focus?', '💪');
      setTimerMode('focus');
    }
    playNotificationSound();
  }

  function playNotificationSound() {
    const rt = RINGTONES.find(r => r.id === currentRingtone) || RINGTONES[0];
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      rt.play(ctx, volume / 100);
    } catch(e) {}
  }

  // Timer events
  btnStart.addEventListener('click', () => {
    isRunning ? stopTimer() : startTimer();
  });
  btnReset.addEventListener('click', resetTimer);
  $$('.timer-tab').forEach(tab => {
    tab.addEventListener('click', () => setTimerMode(tab.dataset.mode));
  });

  updateTimerDisplay();

  // ===== Todos =====
  function generateId() {
    return Date.now() + Math.random().toString(36).slice(2, 7);
  }

  function saveTodos() {
    localStorage.setItem('focusflow_todos', JSON.stringify(todos));
  }

  function addTodo(text) {
    text = text.trim();
    if (!text) return;
    todos.unshift({
      id: generateId(),
      text,
      completed: false,
      pomodoros: 0,
      createdAt: Date.now()
    });
    saveTodos();
    renderTodos();
  }

  function toggleTodo(id) {
    const todo = todos.find(t => t.id === id);
    if (todo) {
      todo.completed = !todo.completed;
      if (todo.completed && activeTodoId === id) activeTodoId = null;
      saveTodos();
      renderTodos();
    }
  }

  function deleteTodo(id) {
    todos = todos.filter(t => t.id !== id);
    if (activeTodoId === id) activeTodoId = null;
    saveTodos();
    renderTodos();
  }

  function setActiveTodo(id) {
    activeTodoId = activeTodoId === id ? null : id;
    renderTodos();
  }

  function getFilteredTodos() {
    if (currentFilter === 'active') return todos.filter(t => !t.completed);
    if (currentFilter === 'completed') return todos.filter(t => t.completed);
    return todos;
  }

  function renderTodos() {
    const filtered = getFilteredTodos();
    const doneCount = todos.filter(t => t.completed).length;
    const pendingCount = todos.length - doneCount;
    statDone.textContent = `✅ ${doneCount} done`;
    statPending.textContent = `📋 ${pendingCount} pending`;

    if (filtered.length === 0) {
      todoList.innerHTML = `
        <div class="empty-state">
          <div class="emoji">${currentFilter === 'completed' ? '🎯' : '✨'}</div>
          <p>${currentFilter === 'completed' ? 'No completed tasks yet' : currentFilter === 'active' ? 'All tasks completed!' : 'Add your first task above'}</p>
        </div>
      `;
      return;
    }

    todoList.innerHTML = filtered.map(todo => {
      const isActive = activeTodoId === todo.id;
      return `
        <li class="todo-item ${todo.completed ? 'completed' : ''}" data-id="${todo.id}" style="${isActive ? 'background:var(--accent-light);border-color:var(--accent-glow);' : ''}">
          <button class="todo-checkbox" onclick="window.__toggleTodo('${todo.id}')" title="Toggle complete">
            ${todo.completed ? '✓' : ''}
          </button>
          <span class="todo-text" onclick="window.__setActive('${todo.id}')" title="Click to focus on this task" style="cursor:pointer;">${escapeHtml(todo.text)}</span>
          ${todo.pomodoros > 0 ? `<span class="todo-pomodoro-badge">🍅 ${todo.pomodoros}</span>` : ''}
          <button class="btn-delete" onclick="window.__deleteTodo('${todo.id}')" title="Delete">✕</button>
        </li>
      `;
    }).join('');
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  window.__toggleTodo = toggleTodo;
  window.__deleteTodo = deleteTodo;
  window.__setActive = setActiveTodo;

  btnAddTodo.addEventListener('click', () => {
    addTodo(todoInput.value);
    todoInput.value = '';
    todoInput.focus();
  });
  todoInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      addTodo(todoInput.value);
      todoInput.value = '';
    }
  });

  $$('.filter-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      currentFilter = tab.dataset.filter;
      $$('.filter-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      renderTodos();
    });
  });

  renderTodos();

  // ===== Keyboard Shortcuts =====
  document.addEventListener('keydown', (e) => {
    if (e.code === 'Space' && document.activeElement.tagName !== 'INPUT') {
      e.preventDefault();
      isRunning ? stopTimer() : startTimer();
    }
    if (e.code === 'KeyR' && document.activeElement.tagName !== 'INPUT' && !e.metaKey && !e.ctrlKey) {
      resetTimer();
    }
    if (e.code === 'Escape') {
      closeSettings();
    }
  });

})();
</script>
</body>
</html>
